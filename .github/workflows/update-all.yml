name: Update publications & CV

on:
  schedule:
    # Run at 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  push:
    branches: [ master ]
  workflow_dispatch:

# ──────────── Job ────────────────
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write           # allow pushes from the last step

    # Proxy secrets for scholarly (optional – delete if unused)
    env:
      HTTP_PROXY:  ${{ secrets.HTTP_PROXY }}
      HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}

    steps:

    # 1) Check out the repo -----------------------------------------------------
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0          # keep history/tags for git commit

    # 2) ░░░░░░  PYTHON section  ░░░░░░
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "httpx<0.28" scholarly        # 👈 add the pin

    - name: Update publications (3 attempts, 10 min each)
      shell: bash
      run: |
        set -e
        for i in {1..3}; do
          echo "::group::Attempt $i of 3"
          if timeout 600 python _scripts/update_publications.py; then
            echo "✓ Publications updated on attempt $i"
            echo "::endgroup::"
            break
          else
            code=$?
            echo "⚠️  Attempt $i failed (exit=$code)"
            echo "::endgroup::"
            if [[ $i -lt 3 ]]; then
              echo "⏳ Waiting 300 s before retry…"
              sleep 300
            else
              echo "❌ All attempts failed"
              exit 1
            fi
          fi
        done

    # 3) ░░░░░░  R section  ░░░░░░
    - name: Install system libs for R markdown
      run: |
        sudo apt-get update -y
        sudo apt-get install -y libharfbuzz-dev libfribidi-dev libfontconfig1-dev

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3'

    - name: Cache R packages
      uses: actions/cache@v4
      with:
        path: ~/.local/share/R
        key: ${{ runner.os }}-r-4.3-${{ hashFiles('_scripts/update_cv.R') }}
        restore-keys: ${{ runner.os }}-r-4.3-

    - name: Install R packages required by update_cv.R
      shell: Rscript {0}
      run: |
        pkgs <- c("rmarkdown", "knitr")   # add any others your script needs
        for (p in pkgs) if (!requireNamespace(p, quietly = TRUE)) {
            install.packages(p, type = "binary")
        }

    - name: Render CV
      run: Rscript _scripts/update_cv.R

    # 4) Commit & push any changes ---------------------------------------------
    - name: Commit & push changes
      shell: bash
      run: |
        # Stage files that commonly change; adjust paths as needed
        git add _includes/ docs/ *.html *.pdf 2>/dev/null || true
        if [[ -n "$(git status --porcelain)" ]]; then
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto‑update publications & CV [skip ci]" --no-verify
          git push
        else
          echo "Nothing to commit."
        fi