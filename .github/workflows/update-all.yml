name: Update Publications and Data

on:
  schedule:
    # Run at 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-22.04  # Updated to Ubuntu 22.04 LTS
    timeout-minutes: 30  # Increased timeout to handle longer delays
    # This ensures this job runs before any Pages deployment
    outputs:
      completed: ${{ steps.set-output.outputs.completed }}
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scholarly

    - name: Run publications update script
      run: |
        for i in {1..3}; do
          echo "Attempt $i of 3"
          if python _scripts/update_publications.py; then
            echo "Publications script completed successfully"
            break
          else
            echo "Publications script failed, waiting 120 seconds before retry..."
            sleep 120
          fi
        done

    - name: Run conferences update script
      run: |
        for i in {1..3}; do
          echo "Attempt $i of 3"
          if python _scripts/update_conferences.py; then
            echo "Conferences script completed successfully"
            break
          else
            echo "Conferences script failed, waiting 120 seconds before retry..."
            sleep 120
          fi
        done

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'

    - name: Set up Pandoc
      uses: r-lib/actions/setup-pandoc@v2

    - name: Set up TinyTeX
      uses: r-lib/actions/setup-tinytex@v2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev libfontconfig1-dev libpng-dev libuv1-dev

    - name: Cache R packages
      uses: actions/cache@v3
      with:
        path: ~/.local/share/R
        key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
        restore-keys: ${{ runner.os }}-r-

    - name: Install R dependencies
      run: |
        options(repos = c(CRAN = "https://cloud.r-project.org"))
        install_list <- c("tidyverse", "lubridate", "here", "rmarkdown", "knitr")
        for (pkg in install_list) {
          for (i in 1:3) {
            tryCatch({
              install.packages(pkg)
              break
            }, error = function(e) {
              if (i == 3) stop(paste("Package", pkg, "installation failed after 3 attempts"))
              Sys.sleep(10)
            })
          }
        }
      shell: Rscript {0}

    - name: Render CV
      run: Rscript _scripts/update_cv.R

    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        if ! git diff --quiet HEAD; then
          git commit -m "Update publications and data [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi

    - name: Set output
      id: set-output
      run: echo "completed=true" >> $GITHUB_OUTPUT 